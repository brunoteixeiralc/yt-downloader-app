name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download standalone yt-dlp
        run: |
          curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o yt-dlp
          chmod +x yt-dlp
          echo "YT_DLP_PATH=${{ github.workspace }}/yt-dlp" >> $GITHUB_ENV

      - name: Install ffmpeg
        run: |
          brew install ffmpeg
          echo "FFMPEG_PATH=$(which ffmpeg)" >> $GITHUB_ENV

      - name: Build app
        run: pyinstaller YT_Downloader.spec

      - name: Package .app into zip
        run: |
          cd dist
          zip -r "../YT-Downloader-macOS-${{ matrix.arch }}.zip" "YT Downloader.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-macOS-${{ matrix.arch }}
          path: YT-Downloader-macOS-${{ matrix.arch }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: YT-Downloader-macOS-arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: YT-Downloader-macOS-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YT-Downloader-macOS-arm64.zip
            YT-Downloader-macOS-x86_64.zip
          generate_release_notes: true
